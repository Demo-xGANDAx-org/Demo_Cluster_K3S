- name: Check if runner service exists
  stat:
    path: /etc/systemd/system/actions.runner.Demo-xGANDAx-org.raspberrypi.service
  register: runner_service

- name: Create runner directory
  file:
    path: /home/pi/actions-runner
    state: directory
    owner: pi
  when: not runner_service.stat.exists


- name: Download runner
  get_url:
    url: https://github.com/actions/runner/releases/download/v2.333.1/actions-runner-linux-arm64-2.333.1.tar.gz
    dest: /home/pi/actions-runner/runner.tar.gz
  when: not runner_service.stat.exists

- name: Extract runner
  unarchive:
    src: /home/pi/actions-runner/runner.tar.gz
    dest: /home/pi/actions-runner
    remote_src: yes
  when: not runner_service.stat.exists

- name: Fix permissions for runner directory
  file:
    path: /home/pi/actions-runner
    owner: pi
    group: pi
    recurse: yes
  when: not runner_service.stat.exists

- name: Configure runner
  become: yes
  become_user: pi
  shell: |
    ./config.sh --url https://github.com/Demo-xGANDAx-org --token {{ github_token }} --unattended
  args:
    chdir: /home/pi/actions-runner
    creates: /home/pi/actions-runner/.runner
  when: not runner_service.stat.exists

- name: Install service
  shell: ./svc.sh install
  args:
    chdir: /home/pi/actions-runner
  when: not runner_service.stat.exists

- name: Start service
  shell: ./svc.sh start
  args:
    chdir: /home/pi/actions-runner
